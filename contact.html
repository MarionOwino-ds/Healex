<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>

    <img src="https://cdn-icons-png.flaticon.com/512/2966/2966486.png"
         alt="Logo"
         width="60">

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="blog.html">Blog</a>
        <a href="contact.html">Contact</a>
    </nav>

</header>

<section class="contact-banner">

    <h1>Contact Us</h1>

    <p>
        We'd love to hear from you and help you on your recovery journey.
    </p>

</section>

<section class="contact-container">

    <div class="contact-info">

        <img src="https://images.unsplash.com/photo-1516549655169-df83a0774514?w=700"
             alt="Clinic">

        <h2>Get In Touch</h2>

        <p>Email: info@healex.com</p>

        <p>Phone: +254 700 123 456</p>

        <p>Location: Nairobi, Kenya</p>

    </div>

    <div class="contact-form">

        <h2>Send A Message</h2>

        <form>

            <input type="text" placeholder="Full Name">

            <input type="email" placeholder="Email Address">

            <input type="text" placeholder="Subject">

            <textarea rows="6" placeholder="Your Message"></textarea>

            <button type="submit">
                Send Message
            </button>

        </form>

    </div>

</section>

<footer>

    <p>© 2026 Healex. All Rights Reserved.</p>

</footer>

<script src="script.js"></script>
</body>
</html>
