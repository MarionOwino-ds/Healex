<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Healex</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">
            <svg width="30" height="30" viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg">
                <circle cx="15" cy="15" r="15" fill="#2c8b72"/>
                <rect x="13" y="7" width="4" height="16" fill="white"/>
                <rect x="7" y="13" width="16" height="4" fill="white"/>
            </svg>
            Healex
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="services.html">Services</a>
            <a href="blog.html">Blog</a>
            <a href="contact.html">Contact</a>
        </nav>

        <a href="contact.html" class="btn">Get Started</a>
    </header>

    <section class="contact-banner">
        <h1>Contact Us</h1>
        <p>We'd love to hear from you and help you on your recovery journey.</p>
    </section>

    <section class="contact-container">

        <div class="contact-info">
            <img src="https://images.unsplash.com/photo-1516549655169-df83a0774514?w=700"
                 alt="Healex clinic">
            <h2>Get In Touch</h2>
            <p>Email: info@healex.com</p>
            <p>Phone: +254 700 123 456</p>
            <p>Location: Nairobi, Kenya</p>
        </div>

        <div class="contact-form">

            <h2>Send A Message</h2>

            <form>

                <input type="text" placeholder="Full Name" required>

                <input type="email" placeholder="Email Address" required>

                <input type="text" placeholder="Subject">

                <textarea rows="6" placeholder="Your Message" required></textarea>

                <button type="submit" class="btn">Send Message</button>

            </form>

        </div>

    </section>

    <footer>
        <p>&copy; 2026 Healex. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>

</body>
</html>
